name: Bug Report
description: Create a report to help us improve Engram
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please share as much context as you can so we can reproduce and fix quickly.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues to avoid duplicates.
          required: true
        - label: I read CONTRIBUTING.md / SUPPORT.md and included relevant details.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run '...'
        2. Call tool '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or traceback
      description: Paste relevant output. Please redact secrets (API keys, tokens).
      render: shell
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: What OS, Python version, and IDE are you using?
      placeholder: e.g. macOS 14, Python 3.11, Cursor
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this issue impact usage?
      options:
        - Low (workaround exists)
        - Medium (blocks a workflow)
        - High (major workflow blocked)
        - Critical (security/data loss/crash)
    validations:
      required: true
